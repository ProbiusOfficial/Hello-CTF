    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#3b82f6', dark: '#2563eb' },
                        accent: { DEFAULT: '#6366f1', dark: '#4f46e5' },
                        base: { 50: '#f8fafc', 100: '#f1f5f9', 900: '#0f172a', 950: '#020617' }

                    fontFamily: {

    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .text-gradient {
            background: linear-gradient(45deg, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .text-gradient {
            background: linear-gradient(45deg, #60a5fa, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -20;
            background-image:
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .dark .grid-background {
            background-image:
                linear-gradient(to right, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
        }

        /* Sidebar */
        #leftSidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 14.5rem; z-index: 40;
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(226, 232, 240, 0.85);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark #leftSidebar {
            border-color: rgba(51, 65, 85, 0.65);
            background: rgba(15, 23, 42, 0.95);
        }
        #mainContent { margin-left: 14.5rem; min-height: 100vh; }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 0.75rem; border-radius: 0.625rem;
            font-size: 0.8125rem; font-weight: 500;
            color: rgba(15, 23, 42, 0.78);
            transition: background 0.2s ease, color 0.2s ease;
            text-decoration: none;
        }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.08); color: #3b82f6; }
        .sidebar-link.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(99, 102, 241, 0.12));
            color: #3b82f6; font-weight: 600;
        }
        .dark .sidebar-link { color: rgba(255, 255, 255, 0.78); }
        .dark .sidebar-link:hover { background: rgba(99, 102, 241, 0.12); color: #818cf8; }
        .dark .sidebar-link.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(99, 102, 241, 0.18));
            color: #818cf8;
        }
        .sidebar-link svg { width: 1.125rem; height: 1.125rem; flex-shrink: 0; opacity: 0.65; }
        .sidebar-link:hover svg, .sidebar-link.active svg { opacity: 1; }
        #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 35; }
        #sidebarOverlay.open { display: block; }
        #mobileMenuBtn { display: none; }
        @media (max-width: 1023px) {
            #leftSidebar { transform: translateX(-100%); }
            #leftSidebar.open { transform: translateX(0); }
            #mainContent { margin-left: 0; }
            #mobileMenuBtn { display: flex; }
        }

        /* Card */
        .card-surface {
            border-radius: 1rem;
            border: 1px solid rgba(226, 232, 240, 0.85);
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 1px 2px rgba(59, 130, 246, 0.04), 0 8px 24px -4px rgba(15, 23, 42, 0.06);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .card-surface:hover {
            transform: translateY(-4px);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.08), 0 16px 40px -6px rgba(15, 23, 42, 0.12);
        }
        .dark .card-surface {
            border-color: rgba(51, 65, 85, 0.65);
            background: rgba(15, 23, 42, 0.72);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2), 0 12px 32px -8px rgba(0,0,0,0.35);
        }
        .dark .card-surface:hover {
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.15), 0 20px 48px -8px rgba(0,0,0,0.45);
        }

        /* Tag pills */
        .tag-pill {
            display: inline-flex; align-items: center;
            padding: 0.2rem 0.55rem; border-radius: 9999px;
            font-size: 0.6875rem; font-weight: 600;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        /* Tag filter buttons */
        .tag-filter {
            padding: 0.35rem 0.85rem; border-radius: 9999px;
            font-size: 0.8rem; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            border: 1.5px solid rgba(226, 232, 240, 0.85);
            background: rgba(255, 255, 255, 0.7);
            color: rgba(15, 23, 42, 0.7);
            transition: all 0.2s ease;
        }
        .tag-filter:hover {
            border-color: rgba(59, 130, 246, 0.4);
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .tag-filter.active {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        .dark .tag-filter {
            border-color: rgba(51, 65, 85, 0.65);
            background: rgba(30, 41, 59, 0.6);
            color: rgba(255, 255, 255, 0.6);
        }
        .dark .tag-filter:hover {
            border-color: rgba(99, 102, 241, 0.5);
            color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
        }
        .dark .tag-filter.active {
            border-color: transparent;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        /* Search input */
        .search-box {
            border: 1.5px solid rgba(226, 232, 240, 0.85);
            background: rgba(255, 255, 255, 0.8);
            border-radius: 0.875rem;
            transition: all 0.2s ease;
        }
        .search-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .dark .search-box {
            border-color: rgba(51, 65, 85, 0.65);
            background: rgba(30, 41, 59, 0.6);
        }
        .dark .search-box:focus-within {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.35s ease forwards; }
    </style>
</head>

    <script>
        (function () {
            // ===== Theme =====
            const html = document.documentElement;
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            document.getElementById('themeToggle').addEventListener('click', function () {
                html.classList.toggle('dark');
                localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            });

            // ===== Mobile sidebar =====
            const sidebar = document.getElementById('leftSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const menuBtn = document.getElementById('mobileMenuBtn');
            function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
            menuBtn.addEventListener('click', function () { sidebar.classList.add('open'); overlay.classList.add('open'); });
            overlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

            // ===== Tag color map =====
            var TAG_COLORS = {
                '效率软件': { bg: 'bg-emerald-50 dark:bg-emerald-900/30', text: 'text-emerald-700 dark:text-emerald-300', border: 'border border-emerald-200 dark:border-emerald-700/50' },
                '环境基础': { bg: 'bg-sky-50 dark:bg-sky-900/30', text: 'text-sky-700 dark:text-sky-300', border: 'border border-sky-200 dark:border-sky-700/50' },
                'Web工具':  { bg: 'bg-orange-50 dark:bg-orange-900/30', text: 'text-orange-700 dark:text-orange-300', border: 'border border-orange-200 dark:border-orange-700/50' },
                '编码解密': { bg: 'bg-violet-50 dark:bg-violet-900/30', text: 'text-violet-700 dark:text-violet-300', border: 'border border-violet-200 dark:border-violet-700/50' },
                '文本工具': { bg: 'bg-cyan-50 dark:bg-cyan-900/30', text: 'text-cyan-700 dark:text-cyan-300', border: 'border border-cyan-200 dark:border-cyan-700/50' },
                '隐写工具': { bg: 'bg-pink-50 dark:bg-pink-900/30', text: 'text-pink-700 dark:text-pink-300', border: 'border border-pink-200 dark:border-pink-700/50' },
                '取证工具': { bg: 'bg-amber-50 dark:bg-amber-900/30', text: 'text-amber-700 dark:text-amber-300', border: 'border border-amber-200 dark:border-amber-700/50' },
                'MISC解题': { bg: 'bg-lime-50 dark:bg-lime-900/30', text: 'text-lime-700 dark:text-lime-300', border: 'border border-lime-200 dark:border-lime-700/50' },
                '密码学':   { bg: 'bg-indigo-50 dark:bg-indigo-900/30', text: 'text-indigo-700 dark:text-indigo-300', border: 'border border-indigo-200 dark:border-indigo-700/50' },
                '逆向工具': { bg: 'bg-red-50 dark:bg-red-900/30', text: 'text-red-700 dark:text-red-300', border: 'border border-red-200 dark:border-red-700/50' },
                'PWN工具':  { bg: 'bg-fuchsia-50 dark:bg-fuchsia-900/30', text: 'text-fuchsia-700 dark:text-fuchsia-300', border: 'border border-fuchsia-200 dark:border-fuchsia-700/50' },
                'AWD工具':  { bg: 'bg-teal-50 dark:bg-teal-900/30', text: 'text-teal-700 dark:text-teal-300', border: 'border border-teal-200 dark:border-teal-700/50' }
            };
            var TAG_ORDER = ['效率软件','环境基础','Web工具','编码解密','文本工具','隐写工具','取证工具','MISC解题','密码学','逆向工具','PWN工具','AWD工具'];

            function tagPillHTML(tag) {
                var c = TAG_COLORS[tag] || { bg: 'bg-gray-50 dark:bg-gray-800', text: 'text-gray-600 dark:text-gray-300', border: 'border border-gray-200 dark:border-gray-600' };
                return '<span class="tag-pill ' + c.bg + ' ' + c.text + ' ' + c.border + '">' + tag + '</span>';
            }

            function cardHTML(item, idx) {
                var tagsHTML = item.tags.map(tagPillHTML).join('');
                var hasURL = item.url && item.url !== '#';
                var linkHTML = hasURL
                    ? '<a href="' + item.url + '" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-xs font-semibold text-primary dark:text-accent hover:underline mt-auto pt-3">' +
                      '访问项目 <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"/></svg></a>'
                    : '<span class="inline-flex items-center gap-1.5 text-xs font-medium text-base-900/30 dark:text-white/20 mt-auto pt-3">暂无链接</span>';
                return '<div class="card-surface p-5 flex flex-col fade-in-up" style="animation-delay:' + (idx * 30) + 'ms">' +
                    '<div class="flex flex-wrap gap-1.5 mb-3">' + tagsHTML + '</div>' +
                    '<h3 class="font-semibold text-sm leading-snug mb-1.5 text-base-900 dark:text-white">' + item.name + '</h3>' +
                    '<p class="text-xs text-base-900/55 dark:text-white/45 leading-relaxed flex-1">' + item.desc + '</p>' +
                    linkHTML +
                    '</div>';
            }

            // ===== Data & render =====
            var allTools = [];
            var activeTags = new Set();
            var searchQuery = '';
            var debounceTimer;

            function render() {
                var filtered = allTools.filter(function (t) {
                    var haystack = (t.name + ' ' + t.desc + ' ' + t.tags.join(' ')).toLowerCase();
                    if (searchQuery) {
                        var keywords = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
                        for (var i = 0; i < keywords.length; i++) {
                            if (haystack.indexOf(keywords[i]) === -1) return false;
                        }
                    }
                    if (activeTags.size > 0) {
                        var match = false;
                        for (var j = 0; j < t.tags.length; j++) {
                            if (activeTags.has(t.tags[j])) { match = true; break; }
                        }
                        if (!match) return false;
                    }
                    return true;
                });
                var grid = document.getElementById('cardGrid');
                var empty = document.getElementById('emptyState');
                document.getElementById('visibleCount').textContent = filtered.length;
                if (filtered.length === 0) {
                    grid.innerHTML = '';
                    grid.classList.add('hidden');
                    empty.classList.remove('hidden');
                    empty.classList.add('flex');
                } else {
                    empty.classList.add('hidden');
                    empty.classList.remove('flex');
                    grid.classList.remove('hidden');
                    grid.innerHTML = filtered.map(cardHTML).join('');
                }
            }

            function buildTagBar(tools) {
                var tagSet = new Set();
                tools.forEach(function (t) { t.tags.forEach(function (tg) { tagSet.add(tg); }); });
                var bar = document.getElementById('tagBar');
                TAG_ORDER.forEach(function (tag) {
                    if (!tagSet.has(tag)) return;
                    var btn = document.createElement('button');
                    btn.className = 'tag-filter';
                    btn.dataset.tag = tag;
                    btn.textContent = tag;
                    bar.appendChild(btn);
                });
            }

            // Tag click handler (event delegation)
            document.getElementById('tagBar').addEventListener('click', function (e) {
                var btn = e.target.closest('.tag-filter');
                if (!btn) return;
                var tag = btn.dataset.tag;
                if (tag === 'all') {
                    activeTags.clear();
                    document.querySelectorAll('.tag-filter').forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                } else {
                    document.querySelector('.tag-filter[data-tag="all"]').classList.remove('active');
                    if (activeTags.has(tag)) {
                        activeTags.delete(tag);
                        btn.classList.remove('active');
                        if (activeTags.size === 0) {
                            document.querySelector('.tag-filter[data-tag="all"]').classList.add('active');
                        }
                    } else {
                        activeTags.add(tag);
                        btn.classList.add('active');
                    }
                }
                render();
            });

            // Search
            var searchInput = document.getElementById('searchInput');
            var clearBtn = document.getElementById('clearSearch');
            searchInput.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(function () {
                    searchQuery = searchInput.value.trim();
                    clearBtn.classList.toggle('hidden', !searchQuery);
                    render();
                }, 180);
            });
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                searchQuery = '';
                clearBtn.classList.add('hidden');
                render();
                searchInput.focus();
            });

            // Load data
            fetch('./tools_data.json')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    allTools = data;
                    document.getElementById('toolCount').textContent = data.length;
                    buildTagBar(data);
                    render();
                })
                .catch(function (err) {
                    console.error('Failed to load tools data:', err);
                    document.getElementById('cardGrid').innerHTML = '<p class="col-span-full text-center text-base-900/40 dark:text-white/30 py-20">数据加载失败，请刷新重试。</p>';
                });
        })();
    </script>
</body>
</html>
