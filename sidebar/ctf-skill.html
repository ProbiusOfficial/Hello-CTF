    <script>
        (function () {
            var html = document.documentElement;
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            document.getElementById('themeToggle').addEventListener('click', function () {
                html.classList.toggle('dark');
                localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            });

            var sidebar = document.getElementById('leftSidebar');
            var overlay = document.getElementById('sidebarOverlay');
            var menuBtn = document.getElementById('mobileMenuBtn');
            function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
            menuBtn.addEventListener('click', function () { sidebar.classList.add('open'); overlay.classList.add('open'); });
            overlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

            function c_(name) {
                return { iconBg: 'bg-'+name+'-100 dark:bg-'+name+'-900/40', iconText: 'text-'+name+'-600 dark:text-'+name+'-400', pillBg: 'bg-'+name+'-50 dark:bg-'+name+'-900/30', pillText: 'text-'+name+'-700 dark:text-'+name+'-300', pillBorder: 'border border-'+name+'-200/80 dark:border-'+name+'-700/50', pillHover: 'hover:bg-'+name+'-100 dark:hover:bg-'+name+'-800/40', tagBg: 'bg-'+name+'-100/70 dark:bg-'+name+'-900/50', tagText: 'text-'+name+'-800 dark:text-'+name+'-200' };
            }
            var COLOR_MAP = {
                orange: c_('orange'), indigo: c_('indigo'), emerald: c_('emerald'), red: c_('red'), violet: c_('violet'),
                sky: c_('sky'), cyan: c_('cyan'), amber: c_('amber'), fuchsia: c_('fuchsia'),
                slate: c_('slate'), teal: c_('teal'), rose: c_('rose'), lime: c_('lime')
            };

                terminal: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m6.75 7.5 3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>',
                cpu:      '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 002.25-2.25V6.75a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25zm.75-12h9v9h-9v-9z"/></svg>',
                sparkles: '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>',
                cloud:    '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z"/></svg>',
                shield:   '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>',
                cube:     '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/></svg>',
                cog:      '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 0015 0m-15 0a7.5 7.5 0 1115 0m-15 0H3m16.5 0H21m-1.5 0H12m-8.457 3.077l1.41-.513m14.095-5.13l1.41-.513M5.106 17.785l1.15-.964m11.49-9.642l1.149-.964M7.501 19.795l.75-1.3m7.5-12.99l.75-1.3m-6.063 16.658l.26-1.477m2.605-14.772l.26-1.477m0 17.726l-.26-1.477M10.698 4.614l-.26-1.477M16.5 19.794l-.75-1.299M7.5 4.205L12 12m6.894 5.785l-1.149-.964M6.256 7.178l-1.15-.964m15.352 8.864l-1.41-.513M4.954 9.435l-1.41-.514M12.002 12l-3.75 6.495"/></svg>',
                wifi:     '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"/></svg>',
                bell:     '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>',
                crosshair:'<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 3.75H6A2.25 2.25 0 003.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0120.25 6v1.5m0 9V18A2.25 2.25 0 0118 20.25h-1.5m-9 0H6A2.25 2.25 0 013.75 18v-1.5M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>'
            };

            var allCategories = [];
            var searchQuery = '';
            var debounceTimer;

            function pillHTML(sub, cat, subIdx) {
                var c = COLOR_MAP[cat.color] || COLOR_MAP.orange;
                return '<span class="skill-pill ' + c.pillBg + ' ' + c.pillText + ' ' + c.pillBorder + ' ' + c.pillHover + '" data-cat="' + cat.id + '" data-sub="' + subIdx + '">' + sub.name + '</span>';
            }

            function cardHTML(cat, idx) {
                var c = COLOR_MAP[cat.color] || COLOR_MAP.orange;
                var icon = ICON_SVG[cat.icon] || ICON_SVG.globe;
                var pills = cat.subcategories.map(function (s, i) { return pillHTML(s, cat, i); }).join('');
                var indexHref = '../hc-skill/' + cat.id + '/';

                return '<div class="card-surface p-6 flex flex-col fade-in-up" style="animation-delay:' + (idx * 60) + 'ms">' +
                    '<div class="flex items-start gap-3.5 mb-3">' +
                        '<div class="category-icon ' + c.iconBg + ' ' + c.iconText + '">' + icon + '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<a href="' + indexHref + '" class="group flex items-center gap-2">' +
                                '<h3 class="font-bold text-base leading-snug text-base-900 dark:text-white group-hover:text-primary dark:group-hover:text-accent transition-colors">' + cat.name + '</h3>' +
                                '<span class="text-xs font-medium text-base-900/40 dark:text-white/30">(' + cat.label + ')</span>' +
                            '</a>' +
                            '<p class="text-xs text-base-900/45 dark:text-white/35 mt-0.5 font-mono">' + cat.subcategories.length + ' 个知识域</p>' +
                        '</div>' +
                    '</div>' +
                    '<p class="text-xs text-base-900/55 dark:text-white/45 leading-relaxed mb-4">' + cat.desc + '</p>' +
                    '<div class="flex flex-wrap gap-1.5">' + pills + '</div>' +
                '</div>';
            }

            function render() {
                var filtered = allCategories;
                if (searchQuery) {
                    var kw = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
                    filtered = allCategories.filter(function (cat) {
                        var haystack = (cat.name + ' ' + cat.label + ' ' + cat.desc + ' ' + cat.subcategories.map(function (s) { return s.name + ' ' + (s.tags || []).join(' '); }).join(' ')).toLowerCase();
                        for (var i = 0; i < kw.length; i++) {
                            if (haystack.indexOf(kw[i]) === -1) return false;
                        }
                        return true;
                    });
                }
                var grid = document.getElementById('cardGrid');
                var empty = document.getElementById('emptyState');
                if (filtered.length === 0) {
                    grid.innerHTML = '';
                    grid.classList.add('hidden');
                    empty.classList.remove('hidden');
                    empty.classList.add('flex');
                } else {
                    empty.classList.add('hidden');
                    empty.classList.remove('flex');
                    grid.classList.remove('hidden');
                    grid.innerHTML = filtered.map(cardHTML).join('');
                }
            }

            // ===== Modal =====
            var modalEl = document.getElementById('skillModal');
            var modalTitle = document.getElementById('modalTitle');
            var modalCategory = document.getElementById('modalCategory');
            var modalIcon = document.getElementById('modalIcon');
            var modalTags = document.getElementById('modalTags');
            var modalConfirm = document.getElementById('modalConfirm');
            var modalCancel = document.getElementById('modalCancel');
            var catMap = {};

            function showModal(catId, subIdx) {
                var cat = catMap[catId];
                if (!cat) return;
                var sub = cat.subcategories[subIdx];
                if (!sub) return;
                var c = COLOR_MAP[cat.color] || COLOR_MAP.orange;
                var icon = ICON_SVG[cat.icon] || ICON_SVG.globe;

                modalTitle.textContent = sub.name;
                modalCategory.textContent = cat.name + ' / ' + cat.label;
                modalIcon.className = 'category-icon ' + c.iconBg + ' ' + c.iconText;
                modalIcon.innerHTML = icon;

                var tags = sub.tags || [];
                if (tags.length > 0) {
                    modalTags.innerHTML = tags.map(function (t) {
                        return '<span class="modal-tag ' + c.tagBg + ' ' + c.tagText + '">' + t + '</span>';
                    }).join('');
                } else {
                    modalTags.innerHTML = '<span class="text-xs text-base-900/35 dark:text-white/25">暂无三级标签</span>';
                }

                modalConfirm.href = '../hc-skill/' + cat.id + '/' + sub.slug + '/';
                modalEl.classList.add('open');
            }

            function closeModal() {
                modalEl.classList.remove('open');
            }

            modalCancel.addEventListener('click', closeModal);
            modalEl.addEventListener('click', function (e) {
                if (e.target === modalEl) closeModal();
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && modalEl.classList.contains('open')) closeModal();
            });

            document.getElementById('cardGrid').addEventListener('click', function (e) {
                var pill = e.target.closest('.skill-pill');
                if (!pill) return;
                e.preventDefault();
                showModal(pill.dataset.cat, parseInt(pill.dataset.sub, 10));
            });

            // ===== Search =====
            var searchInput = document.getElementById('searchInput');
            var clearBtn = document.getElementById('clearSearch');
            searchInput.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(function () {
                    searchQuery = searchInput.value.trim();
                    clearBtn.classList.toggle('hidden', !searchQuery);
                    render();
                }, 180);
            });
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                searchQuery = '';
                clearBtn.classList.add('hidden');
                render();
                searchInput.focus();
            });

            fetch('./ctf_skill_data.json')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    allCategories = data;
                    data.forEach(function (c) { catMap[c.id] = c; });
                    var totalSubs = data.reduce(function (sum, c) { return sum + c.subcategories.length; }, 0);
                    document.getElementById('categoryCount').textContent = data.length;
                    document.getElementById('skillCount').textContent = totalSubs;
                    render();
                })
                .catch(function (err) {
                    console.error('Failed to load skill data:', err);
                    document.getElementById('cardGrid').innerHTML = '<p class="col-span-full text-center text-base-900/40 dark:text-white/30 py-20">数据加载失败，请刷新重试。</p>';
                });
        })();
    </script>
</body>
</html>
