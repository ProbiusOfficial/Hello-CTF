        .text-gradient {
            background: linear-gradient(45deg, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .text-gradient {

            -webkit-text-fill-color: transparent;

        .grid-background {

            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);

            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .dark #leftSidebar {

            background: rgba(15, 23, 42, 0.95);
        }

        .sidebar-link:hover { background: rgba(59, 130, 246, 0.08); color: #3b82f6; }
        .sidebar-link.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(99, 102, 241, 0.12));

    <script>
        (function () {
            var html = document.documentElement;
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            document.getElementById('themeToggle').addEventListener('click', function () {
                html.classList.toggle('dark');
                localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            });

            var sidebar = document.getElementById('leftSidebar');
            var overlay = document.getElementById('sidebarOverlay');
            var menuBtn = document.getElementById('mobileMenuBtn');
            function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
            menuBtn.addEventListener('click', function () { sidebar.classList.add('open'); overlay.classList.add('open'); });
            overlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

            var allData = [];
            var activeYear = 'all';
            var searchQuery = '';
            var debounceTimer;

            var GITHUB_SVG = '<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>';
            var STAR_SVG = '<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';

            function repoLinksHTML(repos) {
                return repos.map(function (r) {
                    return '<a href="' + r.url + '" target="_blank" rel="noopener noreferrer" class="repo-link">' + GITHUB_SVG + ' ' + r.label + '</a>';
                }).join('');
            }

            function cardHTML(comp, idx) {
                var starsHTML = '';
                if (comp.stars > 0) {
                    starsHTML = '<span class="star-badge">' + STAR_SVG + ' ' + comp.stars + '</span>';
                }
                return '<div class="card-surface p-5 flex flex-col fade-in-up" style="animation-delay:' + (idx * 40) + 'ms">' +
                    '<div class="flex items-start justify-between gap-2 mb-2">' +
                        '<h3 class="font-bold text-sm leading-snug text-base-900 dark:text-white flex-1">' + comp.name + '</h3>' +
                        starsHTML +
                    '</div>' +
                    '<p class="text-xs text-base-900/50 dark:text-white/40 leading-relaxed mb-3 flex-1">' + comp.desc + '</p>' +
                    '<div class="flex flex-wrap gap-1.5">' + repoLinksHTML(comp.repos) + '</div>' +
                '</div>';
            }

            function render() {
                var container = document.getElementById('cardContainer');
                var empty = document.getElementById('emptyState');
                var html = '';
                var totalVisible = 0;
                var cardIdx = 0;

                var kw = [];
                if (searchQuery) {
                    kw = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
                }

                allData.forEach(function (yearGroup) {
                    if (activeYear !== 'all' && yearGroup.year !== activeYear) return;

                    var filtered = yearGroup.competitions;
                    if (kw.length > 0) {
                        filtered = filtered.filter(function (comp) {
                            var haystack = (comp.name + ' ' + comp.desc).toLowerCase();
                            for (var i = 0; i < kw.length; i++) {
                                if (haystack.indexOf(kw[i]) === -1) return false;
                            }
                            return true;
                        });
                    }

                    if (filtered.length === 0) return;
                    totalVisible += filtered.length;

                    html += '<div class="mb-10">';
                    html += '<h2 class="year-header text-gradient">' + yearGroup.year + '</h2>';
                    html += '<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">';
                    filtered.forEach(function (comp) {
                        html += cardHTML(comp, cardIdx++);
                    });
                    html += '</div></div>';
                });

                if (totalVisible === 0) {
                    container.innerHTML = '';
                    container.classList.add('hidden');
                    empty.classList.remove('hidden');
                    empty.classList.add('flex');
                } else {
                    empty.classList.add('hidden');
                    empty.classList.remove('flex');
                    container.classList.remove('hidden');
                    container.innerHTML = html;
                }
            }

            function buildYearTabs() {
                var tabContainer = document.querySelector('.flex.flex-wrap.items-center.gap-3');
                var years = allData.map(function (g) { return g.year; });
                years.forEach(function (y) {
                    var btn = document.createElement('button');
                    btn.className = 'year-tab';
                    btn.dataset.year = y;
                    btn.textContent = y;
                    tabContainer.appendChild(btn);
                });
            }

            document.addEventListener('click', function (e) {
                var tab = e.target.closest('.year-tab');
                if (!tab) return;
                document.querySelectorAll('.year-tab').forEach(function (t) { t.classList.remove('active'); });
                tab.classList.add('active');
                activeYear = tab.dataset.year;
                render();
            });

            var searchInput = document.getElementById('searchInput');
            var clearBtn = document.getElementById('clearSearch');
            searchInput.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(function () {
                    searchQuery = searchInput.value.trim();
                    clearBtn.classList.toggle('hidden', !searchQuery);
                    render();
                }, 180);
            });
            clearBtn.addEventListener('click', function () {
                searchInput.value = '';
                searchQuery = '';
                clearBtn.classList.add('hidden');
                render();
                searchInput.focus();
            });

            fetch('./archives_data.json')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    allData = data;
                    var totalComps = data.reduce(function (sum, g) { return sum + g.competitions.length; }, 0);
                    document.getElementById('yearCount').textContent = data.length;
                    document.getElementById('compCount').textContent = totalComps;
                    buildYearTabs();
                    render();
                })
                .catch(function (err) {
                    console.error('Failed to load archives data:', err);
                    document.getElementById('cardContainer').innerHTML = '<p class="text-center text-base-900/40 dark:text-white/30 py-20">数据加载失败，请刷新重试。</p>';
                });
        })();
    </script>
</body>
</html>
